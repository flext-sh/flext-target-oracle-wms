Documentation = "https://github.com/flext-sh/flext/blob/main/README.md"
Homepage = "https://github.com/flext-sh/flext"

# [MANAGED] codespell
[tool.codespell]
check-filenames = true
ignore-words-list = "crate,nd"

# [MANAGED] coverage
[tool.coverage.report]
exclude_also = [ "if TYPE_CHECKING:", "if _t.TYPE_CHECKING:", "if typing.TYPE_CHECKING:" ]
fail_under = 20
precision = 2
show_missing = true
skip_covered = false

[tool.coverage.run]
omit = [ "*/dependency_injector/providers.pyx" ]

# [MANAGED] deptry
[tool.deptry]
known_first_party = [
  "flext_cli",
  "flext_core",
  "flext_db_oracle",
  "flext_meltano",
  "flext_observability",
  "flext_oracle_wms",
  "flext_target_oracle_wms",
]
pep621_dev_dependency_groups = [ "dev" ]

[tool.hatch.build.targets.wheel]
packages = [ "src/flext_target_oracle_wms" ]

[tool.hatch.metadata]
allow-direct-references = true

# [MANAGED] mypy
[tool.mypy]
check_untyped_defs = true
disable_error_code = [
  "assignment",
  "attr-defined",
  "call-arg",
  "misc",
  "name-defined",
  "prop-decorator",
  "valid-type",
]
exclude = "^tests/fixtures(?:/|$)"
explicit_package_bases = true
extra_checks = true
follow_imports = "normal"
ignore_missing_imports = true
local_partial_types = true
mypy_path = [ ".", "src" ]
namespace_packages = true
no_implicit_reexport = true
overrides = [  ]
plugins = [ "pydantic.mypy", "returns.contrib.mypy.returns_plugin" ]
python_version = "3.13"
strict_equality = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
warn_unused_ignores = true

[tool.poetry]

# [MANAGED] pydantic-mypy
[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true

# [MANAGED] pyrefly
[tool.pyrefly]
disable-project-excludes-heuristics = true
ignore-errors-in-generated-code = true
project-excludes = [
  "**/*_pb2*.py",
  "**/*_pb2_grpc*.py",
  "**/.venv/**",
  "**/__pycache__",
  "**/__pyrefly_virtual__/**",
