[project]
name = "target-oracle-wms"
version = "0.5.0"
description = "Enterprise Singer Target for Oracle WMS with advanced features"
authors = [
    {name = "DataCosmos Team", email = "team@datacosmos.com"}
]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9,<4.0"
keywords = ["oracle", "wms", "warehouse", "meltano", "singer", "etl", "target"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "singer-sdk[testing]>=0.44.0,<1.0.0",
    "jsonschema>=4.17.3,<5.0.0",
    "sqlalchemy>=2.0.0,<3.0.0",
    "oracledb>=2.0.0,<3.0.0",
    "httpx>=0.24.0,<1.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "structlog>=23.0.0,<25.0.0",
    "rich>=13.0.0,<14.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0,<9.0.0",
    "pytest-cov>=4.0.0,<6.0.0",
    "pytest-mock>=3.12.0,<4.0.0",
    "pytest-asyncio>=0.21.0,<1.0.0",
    "ruff>=0.8.0,<1.0.0",
    "mypy>=1.13.0,<2.0.0",
    "bandit[toml]>=1.7.5,<2.0.0",
    "safety>=3.0.0,<4.0.0",
    "coverage[toml]>=7.2.0,<8.0.0",
]
testing = [
    "pytest>=8.0.0,<9.0.0",
    "pytest-cov>=4.0.0,<6.0.0",
    "pytest-mock>=3.12.0,<4.0.0",
    "pytest-asyncio>=0.21.0,<1.0.0",
    "coverage[toml]>=7.2.0,<8.0.0",
]
typing = [
    "types-jsonschema>=4.17.0.10,<5.0.0.0",
    "types-requests>=2.31.0.0,<3.0.0.0",
    "types-python-dateutil>=2.8.19.0,<3.0.0.0",
]

[project.urls]
Homepage = "https://github.com/datacosmos-team/target-oracle-wms"
Documentation = "https://target-oracle-wms.readthedocs.io"
Repository = "https://github.com/datacosmos-team/target-oracle-wms"
"Bug Tracker" = "https://github.com/datacosmos-team/target-oracle-wms/issues"
Changelog = "https://github.com/datacosmos-team/target-oracle-wms/blob/main/CHANGELOG.md"

[project.scripts]
target-oracle-wms = "target_oracle_wms.target:main"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
package-mode = false

[tool.ruff]
line-length = 88
target-version = "py39"
src = ["src", "tests"]
extend-exclude = ["build", "dist", ".eggs"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "ANN101",  # Missing type annotation for `self` in method
    "ANN102",  # Missing type annotation for `cls` in classmethod
    "D100",    # Missing docstring in public module
    "D101",    # Missing docstring in public class
    "D102",    # Missing docstring in public method
    "D103",    # Missing docstring in public function
    "D104",    # Missing docstring in public package
    "D105",    # Missing docstring in magic method
    "D106",    # Missing docstring in public nested class
    "D107",    # Missing docstring in `__init__`
    "FIX002",  # Line contains TODO
    "TD002",   # Missing author in TODO
    "TD003",   # Missing issue link on line following TODO
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "PLR2004", "ANN201", "ANN001"]
"examples/*" = ["T201", "S101"]
"scripts/*" = ["T201", "S101"]

[tool.ruff.lint.isort]
known-first-party = ["target_oracle_wms"]
required-imports = ["from __future__ import annotations"]

[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "double"

[tool.ruff.lint.flake8-builtins]
builtins-ignorelist = ["id", "type"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.9"
strict = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
warn_unreachable = true
implicit_reexport = false
strict_concatenate = true
strict_equality = true
extra_checks = true

[[tool.mypy.overrides]]
module = [
    "singer_sdk.*",
    "oracledb.*",
    "dotenv.*",
]
ignore_missing_imports = true

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "tests/*",
    "*/tests/*",
    "*/__pycache__/*",
    "*/site-packages/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
    "TYPE_CHECKING",
]
show_missing = true
skip_covered = false
precision = 2

[tool.coverage.html]
directory = "htmlcov"

[tool.bandit]
targets = ["src"]
exclude_dirs = ["tests"]
skips = ["B101", "B601"]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=target_oracle_wms",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=xml",
    "--cov-fail-under=85",
]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*", "*Test", "*Tests"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]
filterwarnings = [
    "error",
    "ignore::UserWarning",
    "ignore::DeprecationWarning",
]
