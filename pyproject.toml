# [MANAGED] build system
[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

# [CUSTOM] project metadata
[project]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Topic :: Database",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: System :: Archiving",
  "Typing :: Typed",
]
dependencies = [
  "flext-cli",
  "flext-core",
  "flext-db-oracle",
  "flext-meltano",
  "flext-observability",
  "flext-oracle-wms",
  "pydantic-core>=2.46.3",
  "pydantic-settings>=2.14.0",
  "pydantic>=2.13.3",
  "sqlalchemy>=2.0.49",
]
description = "FLEXT Target Oracle WMS - Singer Target for Oracle WMS Data"
keywords = [ "data-loading", "enterprise", "etl", "flext", "singer", "target", "typed" ]
license = "MIT"
name = "flext-target-oracle-wms"
readme = "README.md"
requires-python = ">=3.13,<3.14"
version = "0.12.0rc0"

[[project.authors]]
email = "team@flext.sh"
name = "FLEXT Team"

[[project.maintainers]]
email = "team@flext.sh"
name = "FLEXT Team"

